services:
  - type: web
    name: astroguia-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENCAGE_API_KEY
        sync: false
      - key: PROKERALA_CLIENT_ID
        sync: false
      - key: PROKERALA_CLIENT_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
